# Release Please: watches main for Conventional Commits, opens a PR that bumps
# the version and updates CHANGELOG.md. When that PR is merged, a tag and
# GitHub release are created, which then triggers the publish workflow.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
