# Release workflow: runs when a version tag is pushed.
#
# Security design:
#   1. Tests must pass on every supported Node version before publish runs.
#   2. The tag version must match package.json — prevents accidental mis-publish.
#   3. Publish uses npm Trusted Publishing (OIDC). No npm token is stored in
#      the repo; npm verifies the publish request via a short-lived OIDC token
#      issued by GitHub.
#   4. The publish job runs inside a GitHub Environment (`npm-publish`) so you
#      can require manual approval or restrict to specific branches.
#   5. Package is published with --provenance so consumers can cryptographically
#      verify it came from this repo and workflow.
#   6. Default permissions are read-only; jobs escalate only what they need.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [16.x, 18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  verify-version:
    name: Verify tag matches package.json
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag:        $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

  publish-npm:
    name: Publish to npm
    needs: verify-version
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@coffeeandfun/maths-captcha
    permissions:
      contents: write   # create the GitHub release
      id-token: write   # OIDC token for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Upgrade npm to a version that supports Trusted Publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm publish --provenance --access public

      - name: Create GitHub release (if it does not already exist)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists (probably created by release-please). Skipping."
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
