# Unified release workflow.
#
# On every push to main, Release Please either:
#   - opens/updates a release PR (no publish, no gate)
#   - or — if a release PR was just merged — creates the tag + GitHub release
#     and the downstream jobs in this same workflow run the tests and publish
#     to npm via Trusted Publishing (OIDC).
#
# Keeping both steps in one workflow avoids the GITHUB_TOKEN cascade limitation
# that prevents a separate workflow from reacting to a tag pushed by another
# workflow.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 3.1.4) — only used for manual republishes of an existing release'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [16.x, 18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  verify-version:
    name: Verify tag matches package.json
    needs: [release-please, test]
    if: ${{ always() && needs.test.result == 'success' && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || needs.release-please.outputs.tag_name }}
      - name: Compare versions
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag:          $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || needs.release-please.outputs.tag_name }}

  publish-npm:
    name: Publish to npm
    needs: [release-please, verify-version]
    if: ${{ always() && needs.verify-version.result == 'success' && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@coffeeandfun/maths-captcha
    permissions:
      contents: read
      id-token: write   # for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Upgrade npm (Trusted Publishing needs 11.5.1+)
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm publish --provenance --access public
